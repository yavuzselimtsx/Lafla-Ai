# Colab TPU v5e icin gercek veri ve token tabanli uzun baglam curriculum profili.
training:
  accelerator: xla
  max_steps: 250000
  sequence_length: 2048
  sequence_curriculum:
    - 2048
    - 4096
    - 8192
    - 12288
    - 16384
    - 20480
  curriculum_token_boundaries:
    - 0
    - 3600000000
    - 4800000000
    - 5400000000
    - 5700000000
    - 5900000000
  target_tokens: 6000000000
  checkpoint_every_tokens: 25000000
  micro_batch_size: 1
  gradient_accumulation_steps: 16
  precision: bf16
  optimizer: adamw
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  weight_decay: 0.1
  grad_clip_norm: 1.0
  warmup_steps: 2000
  save_every: 500
  keep_last_checkpoints: 4
  checkpoint_min_free_gb: 8.0
  log_every: 10
  seed: 1337
  require_drive_or_explicit_local_fallback: true
