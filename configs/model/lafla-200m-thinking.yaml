# LaflaGPT 200M: LaflaGPT Mini 100M checkpointinden depth-growth ile baslatilacak hedef.
model:
  name: lafla-200m-thinking
  family: decoder-only
  display_name: LaflaGPT 200M
  creator_name: Yavuz Selim
  identity_statement: LaflaGPT 200M, LaflaGPT Mini 100M teknik profil ağırlıklarından katman büyütme ve devam eğitimiyle geliştirilen Türkçe ve Almanca odaklı bir Lafla modelidir.
  parameter_target: 200000000
  vocab_size: 32768
  context_length: 20480
  hidden_size: 768
  intermediate_size: 2048
  num_layers: 29
  num_attention_heads: 12
  num_key_value_heads: 2
  activation: swiglu
  norm: rmsnorm
  rope: true
  qk_norm: true
  rope_theta: 10000.0
  rope_scaling:
    type: linear
    factor: 5.0
    original_context_length: 4096
  attention_pattern:
    - local
    - local
    - local
    - global
  sliding_window: 4096
  norm_eps: 0.00001
  dropout: 0.0
  tie_word_embeddings: true
  use_bias: false
  gradient_checkpointing: true
  initializer_std: 0.02
