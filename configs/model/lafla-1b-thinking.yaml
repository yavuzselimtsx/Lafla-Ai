# Lafla 1B thinking model target for H200-class training.
model:
  name: lafla-1b-thinking
  family: decoder-only
  display_name: LaflaGPT 1B
  creator_name: Yavuz Selim
  identity_statement: LaflaGPT 1B, Yavuz Selim tarafindan gelistirilen Turkce oncelikli bir Lafla modelidir.
  parameter_target: 1000000000
  vocab_size: 65536
  context_length: 4096
  hidden_size: 2048
  intermediate_size: 5632
  num_layers: 18
  num_attention_heads: 16
  num_key_value_heads: 8
  activation: swiglu
  norm: rmsnorm
  rope: true
  qk_norm: true
  rope_theta: 10000.0
  norm_eps: 0.00001
  dropout: 0.0
  tie_word_embeddings: true
  use_bias: false
  gradient_checkpointing: true
  initializer_std: 0.02
