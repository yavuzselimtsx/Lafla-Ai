# LaflaGPT 380M H200 training target.
# 11 layers with 1536 hidden size estimates at about 379.7M trainable parameters.
model:
  name: lafla-380m-thinking
  family: decoder-only
  display_name: LaflaGPT 380M
  creator_name: Yavuz Selim
  identity_statement: LaflaGPT 380M, Yavuz Selim tarafindan gelistirilen Turkce oncelikli bir Lafla modelidir.
  parameter_target: 380000000
  vocab_size: 65536
  context_length: 2048
  hidden_size: 1536
  intermediate_size: 3968
  num_layers: 11
  num_attention_heads: 12
  num_key_value_heads: 6
  activation: swiglu
  norm: rmsnorm
  rope: true
  qk_norm: true
  rope_theta: 10000.0
  norm_eps: 0.00001
  dropout: 0.0
  tie_word_embeddings: true
  use_bias: false
  gradient_checkpointing: true
  initializer_std: 0.02
